<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Frame</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="player-content-only">
        <section class="content">
            <img id="cover" alt="Album Cover">
            <div class="info">
                <span class="label">TRACK</span>
                <h1 id="song">Loading...</h1>
                <span class="label">ARTIST</span>
                <h2 id="artist"></h2>
                <span class="label album-label">ALBUM</span>
                <p id="album"></p>
            </div>
        </section>

        <section class="progress-area">
            <div class="progress">
                <div id="bar"></div>
            </div>
            <div class="time">
                <span id="current">0:00</span>
                <span id="duration">0:00</span>
            </div>
            <!-- Restauramos tu botón clickeable -->
            <a id="spotify" target="_blank" href="#" class="spotify-button">OPEN IN SPOTIFY ↗</a>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
